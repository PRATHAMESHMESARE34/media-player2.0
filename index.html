<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>My Music</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="app">

<!-- Sidebar -->

<div class="sidebar">

<h2>
🎵 My Music
</h2>

<input
type="text"
id="search"
placeholder="Search songs...">

<div
id="songList"
class="song-list">

</div>

</div>

<!-- Player -->

<div class="player">

<div class="cover-area">

<img
id="coverImage"
src="covers/default.jpg"
alt="Album Cover">

</div>

<h1 id="currentSong">
Select a Song
</h1>

<h3 id="currentArtist">
Unknown Artist
</h3>

<div class="time">

<span id="currentTime">

0:00

</span>

<span id="totalTime">

0:00

</span>

</div>

<div
class="progress-container"
id="progressContainer">

<div
class="progress"
id="progress">

</div>

</div>

<div class="controls">

<button id="prev">

<i class="fas fa-backward"></i>

</button>

<button id="play">

<i class="fas fa-play"></i>

</button>

<button id="next">

<i class="fas fa-forward"></i>

</button>

</div>

<div class="volume">

<i class="fas fa-volume-up"></i>

<input
type="range"
id="volume"
min="0"
max="100"
value="100">

</div>

<audio
id="audioPlayer">
</audio>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
