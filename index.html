<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Music Player</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#121212;
    color:white;
}

header{
    background:#1DB954;
    padding:20px;
    text-align:center;
    font-size:30px;
    font-weight:bold;
}

.container{
    width:90%;
    max-width:900px;
    margin:auto;
    padding:20px;
}

.song{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#1f1f1f;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}

button{
    background:#1DB954;
    border:none;
    color:white;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#17a34a;
}

audio{
    width:100%;
    margin-top:20px;
}
</style>
</head>

<body>

<header>
🎵 My Music Player
</header>

<div class="container">

<div class="song">
<span>Song 1</span>
<button onclick="playSong('songs/song1.mp3')">Play</button>
</div>

<div class="song">
<span>Song 2</span>
<button onclick="playSong('songs/song2.mp3')">Play</button>
</div>

<div class="song">
<span>Song 3</span>
<button onclick="playSong('songs/song3.mp3')">Play</button>
</div>

<audio id="player" controls></audio>

</div>

<script>
function playSong(song){
    const player=document.getElementById("player");
    player.src=song;
    player.play();
}
</script>

</body>
</html>
